<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELPA21 Speaking Practice</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        
        /* New Student Header Style */
        .student-header { background: #e8f0fe; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #c2d7f9; }
        .student-header h2 { margin: 0; color: #1967d2; font-size: 1.4em; }
        .student-header p { margin: 5px 0 0; color: #5f6368; font-size: 0.9em; font-weight: bold; }

        .mic-button { background-color: #34a853; color: white; border: none; border-radius: 50%; width: 80px; height: 80px; font-size: 30px; cursor: pointer; transition: transform 0.2s, background-color 0.2s; box-shadow: 0 4px 10px rgba(52, 168, 83, 0.3); }
        .mic-button:active { transform: scale(0.9); background-color: #2d8e47; }
        .mic-button.recording { background-color: #ea4335; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(234, 67, 53, 0.7); } 70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(234, 67, 53, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(234, 67, 53, 0); } }
        #status { margin-top: 20px; color: #555; font-weight: 500; min-height: 1.2em; }
        #response { margin-top: 20px; padding: 15px; background-color: #f9f9f9; border-radius: 8px; border-left: 5px solid #34a853; text-align: left; display: none; font-style: italic; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <div class="student-header">
        <h2 id="display-name">Hello, Student!</h2>
        <p id="display-id">ID: Checking...</p>
    </div>

    <button id="mic-btn" class="mic-button">🎤</button>
    <p id="status">Tap the mic to start speaking</p>
    <div id="response"></div>
</div>

<script>
    // 1. YOUR SETTINGS - REPLACE THE URL BELOW WITH YOUR NEW GOOGLE WEB APP URL
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxqMddrmLquMe9LovGduxO11xTymMhV6H6VyzKaG28EeXer0O4upOleeEhdCilXMjPNZw/exec";

    // 2. GRAB DATA FROM THE URL (the "ID Tags")
    const urlParams = new URLSearchParams(window.location.search);
    const studentId = urlParams.get('studentId') || "Unknown";
    const studentName = urlParams.get('studentName') || "Student";
    const lessonId = urlParams.get('lessonId') || "Lsn_001";

    // 3. UPDATE THE SCREEN
    document.getElementById('display-name').innerText = "Welcome, " + studentName + "!";
    document.getElementById('display-id').innerText = "Student ID: " + studentId;

    // 4. VOICE LOGIC
    const micBtn = document.getElementById('mic-btn');
    const status = document.getElementById('status');
    const responseDiv = document.getElementById('response');
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        status.innerText = "Error: Browser not supported. Use Chrome.";
    } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';

        micBtn.onclick = () => {
            recognition.start();
            micBtn.classList.add('recording');
            status.innerText = "Listening...";
        };

        recognition.onresult = async (event) => {
            micBtn.classList.remove('recording');
            const transcript = event.results[0][0].transcript;
            status.innerText = "Processing: " + transcript;

            // Send to Google Sheets
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        studentId: studentId,
                        studentName: studentName,
                        lessonId: lessonId,
                        text: transcript
                    })
                });
                status.innerText = "Saved to Sheet!";
                responseDiv.innerText = "AI: 'Great job, " + studentName + "! I recorded that.'";
                responseDiv.style.display = "block";
            } catch (err) {
                status.innerText = "Error saving to sheet.";
                console.error(err);
            }
        };

        recognition.onerror = () => {
            micBtn.classList.remove('recording');
            status.innerText = "Try again!";
        };
    }
</script>

</body>
</html>
