<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELPA21 Speaking Practice & Lesson</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background-color: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 600px; text-align: center; }
        
        .student-header { background: #e8f0fe; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #c2d7f9; }
        .student-header h2 { margin: 0; color: #1967d2; font-size: 1.4em; }
        .student-header p { margin: 5px 0 0; color: #5f6368; font-size: 0.9em; font-weight: bold; }

        .lesson-box { background: #ffffff; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #dce6f1; text-align: left; box-shadow: inset 0 0 10px rgba(0,0,0,0.02); }
        .lesson-box h3 { margin: 0 0 15px 0; color: #1967d2; font-size: 1.3em; border-bottom: 2px solid #e8f0fe; padding-bottom: 8px; }
        .lesson-content { color: #333; font-size: 1.05em; line-height: 1.6; }
        
        .prompt-box { background: #fff3cd; padding: 15px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #ffeeba; text-align: left; }
        .prompt-box h3 { margin: 0 0 10px 0; color: #856404; font-size: 1.1em; border-bottom: 1px solid #ffeeba; padding-bottom: 5px; }
        .prompt-box p { margin: 0; color: #533f03; font-size: 1em; line-height: 1.4; font-weight: bold; }

        .mic-button { background-color: #34a853; color: white; border: none; border-radius: 50%; width: 80px; height: 80px; font-size: 30px; cursor: pointer; transition: transform 0.2s, background-color 0.2s; box-shadow: 0 4px 10px rgba(52, 168, 83, 0.3); margin-top: 10px;}
        .mic-button:active { transform: scale(0.9); background-color: #2d8e47; }
        .mic-button.recording { background-color: #ea4335; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(234, 67, 53, 0.7); } 70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(234, 67, 53, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(234, 67, 53, 0); } }
        #status { margin-top: 15px; color: #555; font-weight: 500; min-height: 1.2em; }
        #response { margin-top: 20px; padding: 15px; background-color: #f9f9f9; border-radius: 8px; border-left: 5px solid #34a853; text-align: left; display: none; font-size: 1.05em; line-height: 1.4; color: #333; }
        .score-display { font-weight: bold; font-size: 1.2em; color: #1967d2; margin-bottom: 10px; display: block; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="student-header">
        <h2 id="display-name">Hello, Student!</h2>
        <p id="display-id">ID: Checking...</p>
    </div>

    <div class="lesson-box" id="lesson-box">
        <h3>📚 Today's Lesson</h3>
        <div class="lesson-content" id="full-lesson-text">Loading your lesson materials...</div>
    </div>

    <div class="prompt-box" id="prompt-box">
        <h3>🗣️ Your Speaking Task</h3>
        <p id="prompt-text">Loading your specific prompt...</p>
    </div>

    <button id="mic-btn" class="mic-button">🎤</button>
    <p id="status">Read the lesson above, then tap to answer your speaking task.</p>
    <div id="response"></div>
</div>

<script>
    // 1. YOUR SETTINGS
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwcev5ESj91kByxQJnVvJ1BfjQQZDKW2Y9COFSU4q3Yp227TJGLaswVcGKbg5exe52x/exec";

    // 2. GRAB DATA FROM THE URL
    const urlParams = new URLSearchParams(window.location.search);
    const studentId = urlParams.get('studentId') || "Unknown";
    const studentName = urlParams.get('studentName') || "Student";
    const lessonId = urlParams.get('lessonId') || "Lsn_001";
    let activePrompt = "Discuss today's lesson."; 

    // 3. UPDATE THE HEADER
    document.getElementById('display-name').innerText = "Welcome, " + studentName + "!";
    document.getElementById('display-id').innerText = "Student ID: " + studentId;

// 4. FETCH THE LESSON AND EXTRACT THE PROMPT
    async function fetchLessonPrompt() {
        try {
            const res = await fetch(GOOGLE_SCRIPT_URL + "?lessonId=" + lessonId);
            const data = await res.json();

            // 1. Put the full lesson text in the top box
            if (data.fullLesson) {
                document.getElementById('full-lesson-text').innerHTML = data.fullLesson.replace(/\n/g, '<br>');
            }

            // 2. Put the specific prompt in the bottom box
            if (data.prompt) {
                activePrompt = data.prompt;
                document.getElementById('prompt-text').innerText = activePrompt;
            }

        } catch (err) {
            document.getElementById('full-lesson-text').innerHTML = "Network error: Could not load the lesson.";
            document.getElementById('prompt-text').innerText = "Network error: Please summarize what you learned today.";
        }
    }

    fetchLessonPrompt();

    // 5. VOICE LOGIC
    const micBtn = document.getElementById('mic-btn');
    const status = document.getElementById('status');
    const responseDiv = document.getElementById('response');
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        status.innerText = "Error: Browser not supported. Use Chrome.";
    } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';

        micBtn.onclick = () => {
            responseDiv.style.display = "none";
            responseDiv.innerHTML = "";
            recognition.start();
            micBtn.classList.add('recording');
            status.innerText = "Listening...";
        };

        recognition.onresult = async (event) => {
            micBtn.classList.remove('recording');
            const transcript = event.results[0][0].transcript;
            status.innerText = "Grading against your prompt... Please wait.";

            try {
                const res = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        studentId: studentId,
                        studentName: studentName,
                        lessonId: lessonId,
                        type: 'assessment',
                        prompt: activePrompt, 
                        text: transcript
                    })
                });
                
                const data = await res.json();
                
                status.innerText = "Grading Complete!";
                responseDiv.innerHTML = "<span class='score-display'>ELPA21 Score: " + data.score + " / 5</span>" + data.reply;
                responseDiv.style.display = "block";
                
            } catch (err) {
                status.innerText = "Error saving to sheet.";
                console.error(err);
            }
        };

        recognition.onerror = () => {
            micBtn.classList.remove('recording');
            status.innerText = "Try again!";
        };
    }
</script>

</body>
</html>
